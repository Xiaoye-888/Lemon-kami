name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE: lemon-kami-fastapi
  FRONTEND_IMAGE: lemon-kami-frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Check backend syntax
        run: >
          python -m py_compile
          main.py
          routes_sdk.py
          routes_admin.py
          routes_user.py
          models.py
          authorization_service.py
          database.py
          interface_catalog.py
          routes_docs.py
          sdk.py
          check_apps.py
          sdk/python_sdk/lemon_kami.py

      - name: Run backend tests
        run: PYTHONPATH=. python -m pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install frontend dependencies
        working-directory: admin
        run: npm ci

      - name: Build frontend
        working-directory: admin
        run: npm run build

  build-and-deploy:
    name: Build Docker Images And Deploy
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t "${BACKEND_IMAGE}:${GITHUB_SHA}" .
          docker build -t "${FRONTEND_IMAGE}:${GITHUB_SHA}" ./admin
          docker save "${BACKEND_IMAGE}:${GITHUB_SHA}" "${FRONTEND_IMAGE}:${GITHUB_SHA}" | gzip > lemon-kami-images.tar.gz

      - name: Prepare SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/lemon_kami_deploy_key
          chmod 600 ~/.ssh/lemon_kami_deploy_key
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          SERVER_PORT="${SERVER_PORT:-22}"
          ssh-keyscan -p "${SERVER_PORT}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        shell: bash
        run: |
          set -Eeuo pipefail
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          SERVER_PORT="${SERVER_PORT:-22}"
          REMOTE="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          ssh -i ~/.ssh/lemon_kami_deploy_key -p "${SERVER_PORT}" "${REMOTE}" "mkdir -p /tmp/lemon-kami-deploy"
          scp -i ~/.ssh/lemon_kami_deploy_key -P "${SERVER_PORT}" \
            lemon-kami-images.tar.gz \
            docker-compose.prod.yml \
            scripts/remote_deploy.sh \
            "${REMOTE}:/tmp/lemon-kami-deploy/"

      - name: Deploy on server
        shell: bash
        run: |
          set -Eeuo pipefail
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          SERVER_PORT="${SERVER_PORT:-22}"
          REMOTE="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          ssh -i ~/.ssh/lemon_kami_deploy_key -p "${SERVER_PORT}" "${REMOTE}" \
            "chmod +x /tmp/lemon-kami-deploy/remote_deploy.sh && APP_IMAGE_TAG='${GITHUB_SHA}' /tmp/lemon-kami-deploy/remote_deploy.sh"
