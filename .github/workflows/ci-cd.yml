name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lemon-kami-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: lemon-kami-fastapi
  FRONTEND_IMAGE: lemon-kami-frontend
  DEFAULT_SERVER_HOST: 154.12.26.231
  DEFAULT_CORS_ALLOWED_ORIGINS: http://154.12.26.231

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Check backend syntax
        run: >
          python -m py_compile
          main.py
          routes_sdk.py
          routes_admin.py
          routes_user.py
          models.py
          authorization_service.py
          database.py
          interface_catalog.py
          routes_docs.py
          sdk.py
          check_apps.py
          sdk/python_sdk/lemon_kami.py

      - name: Run backend tests
        run: PYTHONPATH=. python -m pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install frontend dependencies
        working-directory: admin
        run: npm ci

      - name: Build frontend
        working-directory: admin
        run: npm run build

  build-and-deploy:
    name: Build Docker Images And Deploy
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          LOGIN_AES_KEY: ${{ secrets.LOGIN_AES_KEY }}
          BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
        run: |
          set -Eeuo pipefail

          strip_leading_bom() {
            local key="$1"
            local value="${!key:-}"
            value="${value#$'\xef\xbb\xbf'}"
            printf -v "${key}" '%s' "${value}"
          }

          for key in \
            SERVER_HOST \
            SERVER_USER \
            SERVER_SSH_KEY \
            SERVER_PORT \
            DEPLOY_APP_DIR \
            DEPLOY_DIR \
            MYSQL_ROOT_PASSWORD \
            MYSQL_PASSWORD \
            DATABASE_URL \
            SECRET_KEY \
            CORS_ALLOWED_ORIGINS \
            LOGIN_AES_KEY \
            BOOTSTRAP_ADMIN_PASSWORD; do
            strip_leading_bom "${key}"
          done

          SERVER_HOST="${SERVER_HOST:-${DEFAULT_SERVER_HOST}}"
          CORS_ALLOWED_ORIGINS="${CORS_ALLOWED_ORIGINS:-${DEFAULT_CORS_ALLOWED_ORIGINS}}"

          required=(
            SERVER_USER
            SERVER_SSH_KEY
            MYSQL_ROOT_PASSWORD
            MYSQL_PASSWORD
            DATABASE_URL
            SECRET_KEY
            LOGIN_AES_KEY
            BOOTSTRAP_ADMIN_PASSWORD
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub secret: ${key}" >&2
              exit 1
            fi
          done

          if [ -n "${SERVER_PORT:-}" ] && ! [[ "${SERVER_PORT}" =~ ^[0-9]+$ ]]; then
            echo "SERVER_PORT must be a number when set." >&2
            exit 1
          fi

          for key in DEPLOY_APP_DIR DEPLOY_DIR; do
            value="${!key:-}"
            if [ -n "${value}" ]; then
              if [[ "${value}" != /* ]]; then
                echo "${key} must be an absolute Linux path when set." >&2
                exit 1
              fi
              if [ "${value}" = "/" ]; then
                echo "${key} must not be /." >&2
                exit 1
              fi
              if [[ "${value}" =~ [[:space:]] ]]; then
                echo "${key} must not contain whitespace." >&2
                exit 1
              fi
            fi
          done

      - name: Build Docker images
        run: |
          docker build -t "${BACKEND_IMAGE}:${GITHUB_SHA}" .
          docker build -t "${FRONTEND_IMAGE}:${GITHUB_SHA}" ./admin
          docker save "${BACKEND_IMAGE}:${GITHUB_SHA}" "${FRONTEND_IMAGE}:${GITHUB_SHA}" | gzip > lemon-kami-images.tar.gz

      - name: Prepare runtime environment
        shell: bash
        env:
          HTTP_PORT: ${{ secrets.HTTP_PORT }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          DEBUG: ${{ secrets.DEBUG }}
          ENABLE_API_DOCS: ${{ secrets.ENABLE_API_DOCS }}
          TIMESTAMP_TOLERANCE: ${{ secrets.TIMESTAMP_TOLERANCE }}
          NONCE_TTL: ${{ secrets.NONCE_TTL }}
          RATE_LIMIT_MAX: ${{ secrets.RATE_LIMIT_MAX }}
          RATE_LIMIT_WINDOW: ${{ secrets.RATE_LIMIT_WINDOW }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          LOGIN_AES_KEY: ${{ secrets.LOGIN_AES_KEY }}
          BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
          TZ: ${{ secrets.TZ }}
        run: |
          set -Eeuo pipefail

          strip_leading_bom() {
            local key="$1"
            local value="${!key:-}"
            value="${value#$'\xef\xbb\xbf'}"
            printf -v "${key}" '%s' "${value}"
          }

          for key in \
            HTTP_PORT \
            MYSQL_ROOT_PASSWORD \
            MYSQL_DATABASE \
            MYSQL_USER \
            MYSQL_PASSWORD \
            DATABASE_URL \
            REDIS_URL \
            SECRET_KEY \
            ALGORITHM \
            ACCESS_TOKEN_EXPIRE_MINUTES \
            DEBUG \
            ENABLE_API_DOCS \
            TIMESTAMP_TOLERANCE \
            NONCE_TTL \
            RATE_LIMIT_MAX \
            RATE_LIMIT_WINDOW \
            CORS_ALLOWED_ORIGINS \
            LOGIN_AES_KEY \
            BOOTSTRAP_ADMIN_PASSWORD \
            TZ; do
            strip_leading_bom "${key}"
          done

          CORS_ALLOWED_ORIGINS="${CORS_ALLOWED_ORIGINS:-${DEFAULT_CORS_ALLOWED_ORIGINS}}"

          required=(
            MYSQL_ROOT_PASSWORD
            MYSQL_PASSWORD
            DATABASE_URL
            SECRET_KEY
            LOGIN_AES_KEY
            BOOTSTRAP_ADMIN_PASSWORD
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub secret: ${key}" >&2
              exit 1
            fi
          done

          umask 077
          {
            printf 'APP_IMAGE_TAG=%s\n' "${GITHUB_SHA}"
            printf 'HTTP_PORT=%s\n' "${HTTP_PORT:-80}"
            printf 'MYSQL_ROOT_PASSWORD=%s\n' "${MYSQL_ROOT_PASSWORD}"
            printf 'MYSQL_DATABASE=%s\n' "${MYSQL_DATABASE:-lemon_kami}"
            printf 'MYSQL_USER=%s\n' "${MYSQL_USER:-lemon_user}"
            printf 'MYSQL_PASSWORD=%s\n' "${MYSQL_PASSWORD}"
            printf 'DATABASE_URL=%s\n' "${DATABASE_URL}"
            printf 'REDIS_URL=%s\n' "${REDIS_URL:-redis://redis:6379/0}"
            printf 'SECRET_KEY=%s\n' "${SECRET_KEY}"
            printf 'ALGORITHM=%s\n' "${ALGORITHM:-HS256}"
            printf 'ACCESS_TOKEN_EXPIRE_MINUTES=%s\n' "${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}"
            printf 'DEBUG=%s\n' "${DEBUG:-false}"
            printf 'ENABLE_API_DOCS=%s\n' "${ENABLE_API_DOCS:-false}"
            printf 'TIMESTAMP_TOLERANCE=%s\n' "${TIMESTAMP_TOLERANCE:-60}"
            printf 'NONCE_TTL=%s\n' "${NONCE_TTL:-60}"
            printf 'RATE_LIMIT_MAX=%s\n' "${RATE_LIMIT_MAX:-1000}"
            printf 'RATE_LIMIT_WINDOW=%s\n' "${RATE_LIMIT_WINDOW:-60}"
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "${CORS_ALLOWED_ORIGINS}"
            printf 'LOGIN_AES_KEY=%s\n' "${LOGIN_AES_KEY}"
            printf 'BOOTSTRAP_ADMIN_PASSWORD=%s\n' "${BOOTSTRAP_ADMIN_PASSWORD}"
            printf 'TZ=%s\n' "${TZ:-Asia/Shanghai}"
          } > runtime.env

      - name: Prepare SSH
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/lemon_kami_deploy_key
          chmod 600 ~/.ssh/lemon_kami_deploy_key
          SERVER_PORT="${SERVER_PORT:-22}"
          SERVER_HOST="${SERVER_HOST:-${DEFAULT_SERVER_HOST}}"
          ssh-keyscan -p "${SERVER_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          set -Eeuo pipefail
          SERVER_PORT="${SERVER_PORT:-22}"
          SERVER_HOST="${SERVER_HOST:-${DEFAULT_SERVER_HOST}}"
          DEPLOY_DIR="${DEPLOY_DIR:-/tmp/lemon-kami-deploy}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"
          printf -v MKDIR_CMD 'mkdir -p %q' "${DEPLOY_DIR}"
          ssh -i ~/.ssh/lemon_kami_deploy_key -p "${SERVER_PORT}" "${REMOTE}" "${MKDIR_CMD}"
          scp -i ~/.ssh/lemon_kami_deploy_key -P "${SERVER_PORT}" \
            lemon-kami-images.tar.gz \
            docker-compose.prod.yml \
            runtime.env \
            scripts/remote_deploy.sh \
            "${REMOTE}:${DEPLOY_DIR}/"

      - name: Deploy on server
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          set -Eeuo pipefail
          SERVER_PORT="${SERVER_PORT:-22}"
          SERVER_HOST="${SERVER_HOST:-${DEFAULT_SERVER_HOST}}"
          DEPLOY_APP_DIR="${DEPLOY_APP_DIR:-/opt/lemon-kami}"
          DEPLOY_DIR="${DEPLOY_DIR:-/tmp/lemon-kami-deploy}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"
          printf -v DEPLOY_CMD 'chmod +x %q && APP_IMAGE_TAG=%q APP_DIR=%q DEPLOY_DIR=%q %q' \
            "${DEPLOY_DIR}/remote_deploy.sh" \
            "${GITHUB_SHA}" \
            "${DEPLOY_APP_DIR}" \
            "${DEPLOY_DIR}" \
            "${DEPLOY_DIR}/remote_deploy.sh"
          ssh -i ~/.ssh/lemon_kami_deploy_key -p "${SERVER_PORT}" "${REMOTE}" \
            "${DEPLOY_CMD}"
