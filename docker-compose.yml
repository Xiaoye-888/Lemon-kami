name: lemon-kami-dev

services:
  mysql:
    image: mysql:8.0
    container_name: lemon_kami_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lemon_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lemon_kami}
      MYSQL_USER: ${MYSQL_USER:-lemon_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lemon_password}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - lemon_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: lemon_kami_redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - lemon_network
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: lemon-kami-fastapi:dev
    container_name: lemon_kami_fastapi
    init: true
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://lemon_user:lemon_password@mysql:3306/lemon_kami}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-for-lemon-kami-only}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      DEBUG: ${DEBUG:-true}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-true}
      TIMESTAMP_TOLERANCE: ${TIMESTAMP_TOLERANCE:-60}
      NONCE_TTL: ${NONCE_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1000}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      LOGIN_AES_KEY: ${LOGIN_AES_KEY:-bG9jYWwtZGV2LTEyMzQ1Ng==}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-local-admin-password}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - .:/app
      - fastapi_logs:/app/logs
      - fastapi_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lemon_network
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app",
        "--reload-exclude",
        ".git",
        "--reload-exclude",
        "admin/node_modules",
        "--reload-exclude",
        "logs",
      ]

  frontend:
    image: node:22-alpine
    container_name: lemon_kami_frontend
    working_dir: /app
    init: true
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_PROXY_TARGET: http://fastapi:8000
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      - ./admin:/app
      - frontend_node_modules:/app/node_modules
      - frontend_npm_cache:/root/.npm
    depends_on:
      fastapi:
        condition: service_started
    networks:
      - lemon_network
    restart: unless-stopped
    command: >
      sh -c "npm install --prefer-offline --no-audit --fund=false --registry=${NPM_REGISTRY:-https://mirrors.cloud.tencent.com/npm/} &&
      npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  mysql_data:
  redis_data:
  fastapi_logs:
  fastapi_uploads:
  frontend_node_modules:
  frontend_npm_cache:

networks:
  lemon_network:
    driver: bridge
